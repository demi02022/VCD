<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 학사일정 캘린더</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner site-header-simple">

        <div class="brand-block">
          <p class="brand-year">Visual Design Student Council 2026</p>
          <strong>국민대학교 시각디자인학과</strong>
        </div>
        <div class="social-links">
          <a class="social-item" href="https://www.instagram.com/kmudesign/" target="_blank" rel="noreferrer" aria-label="국민대학교 조형대학 인스타그램">
            <span class="social-link">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
                <circle cx="12" cy="12" r="4.2"></circle>
                <circle cx="17.2" cy="6.8" r="1.2"></circle>
              </svg>
            </span>
            <span class="social-label">조형대학</span>
          </a>
          <a class="social-item" href="https://www.instagram.com/kmuvcdofficial/" target="_blank" rel="noreferrer" aria-label="국민대학교 시각디자인학과 학생회 인스타그램">
            <span class="social-link">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
                <circle cx="12" cy="12" r="4.2"></circle>
                <circle cx="17.2" cy="6.8" r="1.2"></circle>
              </svg>
            </span>
            <span class="social-label">시각디자인학과</span>
          </a>
        </div>
      </div>
    </header>
    <main class="calendar-page">
      <section class="calendar-shell">
        <div class="calendar-panel">
          <div class="calendar-topbar">
            <div>
              <p id="month-label" class="month-label"></p>
              <h2 id="month-title"></h2>
              <p id="month-description" class="panel-description"></p>
            </div>
            <div class="calendar-links">
              <a class="inline-link primary home-icon-link" href="index.html" aria-label="메인으로 돌아가기"><img src="assets/home-icon.svg" alt="" aria-hidden="true" /></a>
            </div>
          </div>

          <div class="month-navigation" id="month-navigation"></div>

          <div class="calendar-grid-layout">
            <section class="calendar-board">
              <div class="calendar-weekdays">
                <span>일</span>
                <span>월</span>
                <span>화</span>
                <span>수</span>
                <span>목</span>
                <span>금</span>
                <span>토</span>
              </div>
              <div class="calendar-days" id="calendar-days"></div>
            </section>

            <aside class="event-board">
              <div class="month-header">
                <div>
                  <p class="panel-kicker">Monthly Events</p>
                  <h3>이달의 주요 일정</h3>
                </div>
              </div>
              <ul class="month-event-list" id="month-events"></ul>
              <p class="source-note">
                공식 기준: 국민대학교 학사안내 2026학년도 학사일정
                <a href="https://www.kookmin.ac.kr/user/scGuid/scSchedule/index.do" target="_blank" rel="noreferrer">
                  공식 페이지
                </a>
              </p>
            </aside>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
    <script src="language.js"></script>
  </body>
</html>
