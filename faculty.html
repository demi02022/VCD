<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>교수님 연락처</title>
    <style>
      :root {
        --bg1: #2a3d5d;
        --bg2: #1b2b45;
        --bg3: #122038;
        --panel: #fbf7ee;
        --line: rgba(12, 26, 50, 0.12);
        --ink: #101114;
        --muted: #5d6473;
        --navy: #0c1a32;
        --red: #c41230;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 44%, var(--bg3) 100%);
      }
      .page {
        min-height: 100vh;
        padding: 24px;
      }
      .shell {
        width: min(1120px, 100%);
        margin: 0 auto;
      }
      .panel {
        display: grid;
        gap: 20px;
        padding: 24px;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255,255,255,0.99) 0%, rgba(248,244,236,0.99) 100%);
        box-shadow: 0 20px 44px rgba(7, 17, 32, 0.18);
      }
      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
      }
      .title-copy {
        display: grid;
        gap: 8px;
      }
      .kicker {
        margin: 0;
        color: var(--red);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 700;
      }
      h1, h2, h3, p { margin: 0; }
      h1 {
        font-size: clamp(28px, 3vw, 42px);
        line-height: 1.05;
      }
      .description,
      .mail-meta,
      .tips-copy {
        color: var(--muted);
        line-height: 1.6;
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .link,
      .tips-trigger {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--navy);
        text-decoration: none;
        font: inherit;
        font-weight: 700;
      }
      .link.primary {
        background: var(--navy);
        color: #fff;
        border-color: var(--navy);
      }
      .home-icon-link {
        width: 44px;
        height: 44px;
        min-height: 44px;
        padding: 0;
        border-radius: 999px;
        box-shadow: 0 10px 22px rgba(7, 17, 32, 0.16);
      }
      .home-icon-link img {
        width: 20px;
        height: 20px;
        display: block;
      }
      .tips-anchor {
        position: relative;
        display: inline-flex;
      }
      .tips-panel {
        position: absolute;
        top: calc(100% + 12px);
        right: 0;
        width: 320px;
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid rgba(12, 26, 50, 0.12);
        background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(246,241,232,0.98) 100%);
        box-shadow: 0 18px 34px rgba(7, 17, 32, 0.18);
        opacity: 0;
        visibility: hidden;
        transform: translateY(-8px);
        transition: opacity 180ms ease, transform 180ms ease, visibility 180ms ease;
        pointer-events: none;
      }
      .tips-anchor:hover .tips-panel,
      .tips-anchor:focus-within .tips-panel {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }
      .tips-panel h3 {
        font-size: 16px;
        margin-bottom: 8px;
      }
      .tips-list {
        display: grid;
        gap: 6px;
      }
      .tips-list p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }
      .faculty-list {
        display: grid;
        gap: 12px;
      }
      .faculty-card {
        border-radius: 18px;
        border: 1px solid rgba(171, 154, 123, 0.2);
        background: rgba(255,255,255,0.74);
        overflow: hidden;
      }
      .faculty-toggle {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 18px 20px;
        border: 0;
        background: transparent;
        color: var(--ink);
        font: inherit;
        text-align: left;
        cursor: pointer;
      }
      .faculty-toggle strong {
        font-size: 18px;
      }
      .faculty-arrow {
        color: var(--muted);
        transition: transform 180ms ease;
      }
      .faculty-card.is-open .faculty-arrow {
        transform: rotate(180deg);
      }
      .faculty-mail {
        display: none;
        padding: 0 20px 18px;
      }
      .faculty-card.is-open .faculty-mail {
        display: grid;
        gap: 8px;
      }
      .mail-label {
        color: var(--navy);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
      }
      .mail-box {
        padding: 14px 16px;
        border-radius: 14px;
        background: var(--panel);
        border: 1px solid rgba(171, 154, 123, 0.2);
      }
      @media (max-width: 900px) {
        .page { padding: 16px; }
        .panel { padding: 18px; }
        .tips-panel {
          right: auto;
          left: 0;
          width: min(320px, calc(100vw - 32px));
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="shell">
        <div class="panel">
          <div class="topbar">
            <div class="title-copy">
              <p class="kicker">Faculty Contact</p>
              <h1>교수님 연락처</h1>
            </div>
            <div class="actions">
              <a class="link primary home-icon-link" href="index.html" aria-label="메인으로 돌아가기"><img src="assets/home-icon.svg" alt="" aria-hidden="true" /></a>
            </div>
          </div>

          <div class="faculty-list" id="faculty-list"></div>
        </div>
      </section>
    </main>

    <script>
      const professors = [
        { name: "성재혁 교수님", email: "jhsung@kookmin.ac.kr" },
        { name: "이준희 교수님", email: "jazz@kookmin.ac.kr" },
        { name: "정신재 교수님", email: "shine.jay.jung@gmail.com" },
        { name: "이지원 교수님", email: "jiwonlee@kookmin.ac.kr" },
        { name: "이보람 교수님", email: "br.lee@kookmin.ac.kr" },
        { name: "명윤경 교수님", email: "ymyung0712@kookmin.ac.kr" },
        { name: "한지연 교수님", email: "hanjiyon@kookmin.ac.kr" },
        { name: "강구용 교수님", email: "Kanggr9@gmail.com" }
      ];

      const list = document.getElementById("faculty-list");

      professors.forEach(({ name, email }) => {
        const card = document.createElement("section");
        card.className = "faculty-card";
        card.innerHTML = `
          <button class="faculty-toggle" type="button">
            <strong>${name}</strong>
            <span class="faculty-arrow">▼</span>
          </button>
          <div class="faculty-mail">
            <p class="mail-label">Mail</p>
            <div class="mail-box">
              <p class="mail-meta">${email}</p>
            </div>
          </div>
        `;
        list.appendChild(card);
      });

      list.querySelectorAll('.faculty-toggle').forEach((button) => {
        button.addEventListener('click', () => {
          button.closest('.faculty-card')?.classList.toggle('is-open');
        });
      });
    </script>
  </body>
</html>
